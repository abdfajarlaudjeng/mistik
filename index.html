<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Rumus A6ML-C4M9</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        h2 {
            text-align: center;
            color: #ffcc00;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 5px;
            background-color: #333;
            color: #fff;
            font-size: 18px;
            text-align: center;
            box-sizing: border-box;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #2a2a2a;
            border-left: 5px solid #ffcc00;
            border-radius: 5px;
        }
        .result-item {
            margin-bottom: 8px;
            font-size: 16px;
        }
        .highlight {
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Rumus Otomatis HK</h2>
    <div class="form-group">
        <label for="angkaInput">Masukkan Angka 4D Sebelumnya:</label>
        <input type="text" id="angkaInput" placeholder="Contoh: 7895" maxlength="4" oninput="hitungRumus()">
    </div>

    <div class="result-box">
        <div class="result-item">Posisi AS: <span id="posisiAs" class="highlight">-</span></div>
        <div class="result-item">Posisi COP: <span id="posisiCop" class="highlight">-</span></div>
        <hr style="border-color: #444;">
        <div class="result-item">Hasil A6ML: <span id="hasilA6ml" class="highlight">-</span></div>
        <div class="result-item">Hasil C4M9: <span id="hasilC4m9" class="highlight">-</span></div>
        <hr style="border-color: #444;">
        <div class="result-item" style="font-size: 18px;">Prediksi Angka Ikut (AI): <span id="kesimpulan" style="color: #00ffcc; font-weight: bold;">-</span></div>
    </div>
</div>

<script>
// Tabel Konversi Mistik
const mistikLama = {0:1, 1:0, 2:5, 3:8, 4:7, 5:2, 6:9, 7:4, 8:3, 9:6};
const mistikBaru = {0:8, 1:7, 2:6, 3:9, 4:5, 5:4, 6:2, 7:1, 8:0, 9:3};

function hitungRumus() {
    let input = document.getElementById("angkaInput").value;
    
    // Validasi harus 4 digit angka
    if (input.length !== 4 || isNaN(input)) {
        resetHasil();
        return;
    }

    // Pecah posisi 4D
    let as = parseInt(input[0]);
    let cop = parseInt(input[1]);

    document.getElementById("posisiAs").innerText = as;
    document.getElementById("posisiCop").innerText = cop;

    // 1. Hitung Pola A6ML -> (As + 6) lalu di Mistik Lama
    let prosesAs = (as + 6) % 10; // % 10 agar tetap 1 digit jika hasil > 9
    let hasilA6ml = mistikLama[prosesAs];
    document.getElementById("hasilA6ml").innerText = `(${as} + 6 = ${prosesAs}) ➔ ML = ${hasilA6ml}`;

    // 2. Hitung Pola C4M9 -> (Cop + 4) lalu di Mistik Baru
    let prosesCop = (cop + 4) % 10;
    let hasilC4m9 = mistikBaru[prosesCop];
    document.getElementById("hasilC4m9").innerText = `(${cop} + 4 = ${prosesCop}) ➔ M9 = ${hasilC4m9}`;

    // Kesimpulan Angka Main / Angka Ikut (AI)
    // Jika hasilnya sama, tampilkan 1 angka. Jika beda, tampilkan keduanya.
    let ai = (hasilA6ml === hasilhasilC4m9) ? `${hasilA6ml}` : `${hasilA6ml} atau ${hasilC4m9}`;
    document.getElementById("kesimpulan").innerText = ai;
}

function resetHasil() {
    document.getElementById("posisiAs").innerText = "-";
    document.getElementById("posisiCop").innerText = "-";
    document.getElementById("hasilA6ml").innerText = "-";
    document.getElementById("hasilC4m9").innerText = "-";
    document.getElementById("kesimpulan").innerText = "-";
}
</script>

</body>
</html>
